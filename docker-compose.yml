version: "3.8"

services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: sentinel_zap
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.key=${ZAP_API_KEY:-sentinel-api-key}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports:
      - "8080:8080"
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/JSON/core/view/version/?apikey=${ZAP_API_KEY:-sentinel-api-key}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  juice-shop:
    image: bkimminich/juice-shop
    container_name: sentinel_juice_shop
    ports:
      - "3000:3000"
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  sentinel-net:
    driver: bridge
